# badges_extra.yml — auto-update extra badges
# One GraphQL call → 3 badge files (contributions, commits, issues)
# Isolated from update_readme.yml — safe to run independently

name: Update Extra Badges

on:
  schedule:
    - cron: '30 10 * * *'   # 10:30 UTC — clear of all other workflows
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repo-main-writer
  cancel-in-progress: false

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  update-badges:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout (sparse — badges only)
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 1
          persist-credentials: true
          filter: blob:none
          sparse-checkout: |
            badges
          sparse-checkout-cone-mode: true

      - name: Fetch all metrics (one GraphQL call)
        id: metrics
        shell: bash
        run: |
          set -euo pipefail
          YEAR=$(date -u +%Y)

          RESP=$(gh api graphql \
            -f query='query($login:String!,$from:DateTime!,$to:DateTime!){
              user(login:$login){
                contributionsCollection(from:$from,to:$to){
                  totalCommitContributions
                  totalIssueContributions
                  contributionCalendar{ totalContributions }
                }
              }
            }' \
            -f login="evgeniimatveev" \
            -f from="${YEAR}-01-01T00:00:00Z" \
            -f to="${YEAR}-12-31T23:59:59Z")

          TOTAL=$(printf '%s' "$RESP"  | jq -r '.data.user.contributionsCollection.contributionCalendar.totalContributions // 0')
          COMMITS=$(printf '%s' "$RESP" | jq -r '.data.user.contributionsCollection.totalCommitContributions // 0')
          ISSUES=$(printf '%s' "$RESP"  | jq -r '.data.user.contributionsCollection.totalIssueContributions // 0')

          echo "Contributions ${YEAR}: ${TOTAL} (commits: ${COMMITS}, issues: ${ISSUES})"

          echo "total=$TOTAL"   >> "$GITHUB_OUTPUT"
          echo "commits=$COMMITS" >> "$GITHUB_OUTPUT"
          echo "issues=$ISSUES"  >> "$GITHUB_OUTPUT"
          echo "year=$YEAR"      >> "$GITHUB_OUTPUT"

      - name: Write badge JSON files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p badges

          printf '%s\n' \
            "{\"schemaVersion\":1,\"label\":\"contributions ${{ steps.metrics.outputs.year }}\",\"message\":\"${{ steps.metrics.outputs.total }}\",\"color\":\"0ea5e9\"}" \
            > badges/github_contributions.json

          printf '%s\n' \
            "{\"schemaVersion\":1,\"label\":\"commits ${{ steps.metrics.outputs.year }}\",\"message\":\"${{ steps.metrics.outputs.commits }}\",\"color\":\"22c55e\"}" \
            > badges/github_commits.json

          printf '%s\n' \
            "{\"schemaVersion\":1,\"label\":\"issues ${{ steps.metrics.outputs.year }}\",\"message\":\"${{ steps.metrics.outputs.issues }}\",\"color\":\"f97316\"}" \
            > badges/github_issues.json

          echo "✅ 3 badge files written"

      - name: Commit if changed
        shell: bash
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add badges/github_contributions.json badges/github_commits.json badges/github_issues.json

          if git diff --staged --quiet; then
            echo "No changes — skip commit"
            exit 0
          fi

          git commit -m "chore: refresh extra badges (contributions/commits/issues) [skip ci]"

          for i in 1 2 3; do
            if git push origin HEAD:main; then
              echo "✅ Pushed (attempt $i)"
              exit 0
            fi
            echo "Push failed (attempt $i) — rebasing..."
            sleep $((i * 3))
            git fetch --depth=2 origin main
            git pull --rebase --no-tags origin main
          done

          echo "❌ Push failed after 3 attempts"
          exit 1

      - name: Run summary
        if: always()
        shell: bash
        run: |
          {
            echo "### 📊 Extra Badges — ${{ steps.metrics.outputs.year }}"
            echo "| Badge | Value |"
            echo "|-------|-------|"
            echo "| Contributions | \`${{ steps.metrics.outputs.total }}\` |"
            echo "| Commits | \`${{ steps.metrics.outputs.commits }}\` |"
            echo "| Issues | \`${{ steps.metrics.outputs.issues }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"