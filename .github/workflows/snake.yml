  name: Generate Snake

  on:
    workflow_dispatch:
      inputs:
        variant:
          description: "Force variant: a-n (blank = auto-rotate)"
          type: string
          default: ""
    schedule:
      - cron: "30 0 * * *"

  permissions:
    contents: write

  concurrency:
    group: repo-main-writer
    cancel-in-progress: false

  jobs:
    build:
      runs-on: ubuntu-latest
      timeout-minutes: 15
      steps:
        - name: Checkout repository
          uses: actions/checkout@v5
          with:
            fetch-depth: 2
            persist-credentials: true

        # 14 variants A–N · palette=github · themed color progressions (white-background friendly)
        - name: Generate snake variants (A–N)
          uses: evgeniimatveev/snk/svg-only@main
          env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
          with:
            github_user_name: evgeniimatveev
            outputs: |
              dist/snake-a.svg?palette=github&color_snake=%23ec4899&color_dots=%23fce7f3,%23f9a8d4,%23db2777,%239d174d
              dist/snake-b.svg?palette=github&color_snake=%2306b6d4&color_dots=%23cffafe,%2367e8f9,%230891b2,%23164e63
              dist/snake-c.svg?palette=github&color_snake=%23f97316&color_dots=%23ffedd5,%23fdba74,%23ea580c,%237c2d12
              dist/snake-d.svg?palette=github&color_snake=%23d946ef&color_dots=%23fdf4ff,%23e879f9,%23a21caf,%23701a75
              dist/snake-e.svg?palette=github&color_snake=%2322c55e&color_dots=%23dcfce7,%2386efac,%2316a34a,%2314532d
              dist/snake-f.svg?palette=github&color_snake=%23eab308&color_dots=%23fef9c3,%23fde047,%23ca8a04,%23713f12
              dist/snake-g.svg?palette=github&color_snake=%2314b8a6&color_dots=%23ccfbf1,%235eead4,%230d9488,%23134e4a
              dist/snake-h.svg?palette=github&color_snake=%238b5cf6&color_dots=%23ede9fe,%23c4b5fd,%237c3aed,%234c1d95
              dist/snake-i.svg?palette=github&color_snake=%23fb7185&color_dots=%23fff1f2,%23fecdd3,%23e11d48,%239f1239
              dist/snake-j.svg?palette=github&color_snake=%2394a3b8&color_dots=%23f1f5f9,%23e2e8f0,%23475569,%231e293b
              dist/snake-k.svg?palette=github&color_snake=%23f59e0b&color_dots=%23fffbeb,%23fde68a,%23d97706,%2378350f
              dist/snake-l.svg?palette=github&color_snake=%2384cc16&color_dots=%23f7fee7,%23d9f99d,%2365a30d,%23365314
              dist/snake-m.svg?palette=github&color_snake=%236366f1&color_dots=%23eef2ff,%23c7d2fe,%234f46e5,%23312e81
              dist/snake-n.svg?palette=github&color_snake=%23ef4444&color_dots=%23fef2f2,%23fca5a5,%23dc2626,%237f1d1d

        - name: Pick next variant (A–N) and update snake.svg
          id: pick
          shell: bash
          run: |
            set -euo pipefail
            MODE_FILE=".github/snake-mode"
            ORDER=(a b c d e f g h i j k l m n)
            declare -A LABELS=(
              [a]="Pink"    [b]="Cyan"    [c]="Orange"  [d]="Magenta"
              [e]="Green"   [f]="Yellow"  [g]="Teal"    [h]="Violet"
              [i]="Coral"   [j]="Silver"  [k]="Gold"    [l]="Lime"
              [m]="Indigo"  [n]="Crimson"
            )
            mkdir -p .github dist

            FORCED="${{ inputs.variant }}"
            if [[ -n "$FORCED" ]]; then
              NEXT_MODE="$FORCED"
              echo "Forced variant: $NEXT_MODE (${LABELS[$NEXT_MODE]:-unknown})"
            else
              if [[ -f "$MODE_FILE" ]]; then
                LAST_MODE=$(tr -d '\n\r' < "$MODE_FILE")
              else
                LAST_MODE="n"
              fi

              NEXT_MODE="a"
              for i in "${!ORDER[@]}"; do
                if [[ "${ORDER[$i]}" == "$LAST_MODE" ]]; then
                  NEXT_INDEX=$(( (i + 1) % ${#ORDER[@]} ))
                  NEXT_MODE="${ORDER[$NEXT_INDEX]}"
                  break
                fi
              done
              echo "Last: $LAST_MODE (${LABELS[$LAST_MODE]:-?}) → Next: $NEXT_MODE (${LABELS[$NEXT_MODE]:-?})"
            fi

            SRC="dist/snake-${NEXT_MODE}.svg"
            if [[ ! -f "$SRC" ]]; then
              echo "ERROR: '$SRC' not found."
              ls -la dist || true
              exit 1
            fi

            cp -f "$SRC" dist/snake.svg
            printf '%s\n' "$NEXT_MODE" > "$MODE_FILE"

            echo "variant=$NEXT_MODE"           >> "$GITHUB_OUTPUT"
            echo "label=${LABELS[$NEXT_MODE]}"  >> "$GITHUB_OUTPUT"

        - name: Update snake badge
          shell: bash
          run: |
            set -euo pipefail
            declare -A COLORS=(
              [a]="ec4899" [b]="06b6d4" [c]="f97316" [d]="d946ef"
              [e]="22c55e" [f]="eab308" [g]="14b8a6" [h]="8b5cf6"
              [i]="fb7185" [j]="94a3b8" [k]="f59e0b" [l]="84cc16"
              [m]="6366f1" [n]="ef4444"
            )
            VARIANT="${{ steps.pick.outputs.variant }}"
            LABEL="${{ steps.pick.outputs.label }}"
            COLOR="${COLORS[$VARIANT]}"
            mkdir -p badges
            printf '%s\n' "{\"schemaVersion\":1,\"label\":\"snake\",\"message\":\"${LABEL} (${VARIANT})\",\"color\":\"${COLOR}\"}" \
              > badges/snake_variant.json
            echo "✅ Badge: $LABEL ($VARIANT) #$COLOR"

        - name: Remove legacy light SVGs
          shell: bash
          run: |
            git rm --ignore-unmatch dist/snake-*-light.svg dist/snake-light.svg || true

        - name: Commit and push changes (with retry)
          shell: bash
          run: |
            set -euo pipefail
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            git add dist/snake-*.svg dist/snake.svg .github/snake-mode badges/snake_variant.json || true

            if git diff --cached --quiet; then
              echo "No changes to commit."
              exit 0
            fi

            git commit -m "🐍 snake: variant-${{ steps.pick.outputs.variant }} (${{ steps.pick.outputs.label }}) · $(date -u +%Y-%m-%d)"

            for i in 1 2 3; do
              if git push origin main; then
                echo "✅ Pushed (attempt $i)"
                exit 0
              fi
              echo "Push failed (attempt $i) — rebasing..."
              sleep $((i * 3))
              git fetch --depth=2 origin main
              git pull --rebase --no-tags origin main
            done

            echo "❌ Push failed after 3 attempts"
            exit 1

        - name: Run summary
          if: always()
          shell: bash
          run: |
            {
              echo "### 🐍 Generate Snake"
              echo ""
              echo "| Key | Value |"
              echo "|-----|-------|"
              echo "| Active variant | \`${{ steps.pick.outputs.variant }}\` — ${{ steps.pick.outputs.label }} |"
              echo "| Total variants | 14 (A–N) |"
              echo "| Palette | \`github\` (white-background friendly) |"
              echo ""
              echo "**Palette map:**"
              echo "\`a\` Pink · \`b\` Cyan · \`c\` Orange · \`d\` Magenta · \`e\` Green · \`f\` Yellow · \`g\` Teal"
              echo "\`h\` Violet · \`i\` Coral · \`j\` Silver · \`k\` Gold · \`l\` Lime · \`m\` Indigo · \`n\` Crimson"
            } >> "$GITHUB_STEP_SUMMARY"
