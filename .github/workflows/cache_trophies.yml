name: Cache GitHub Trophies

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  cache-trophies:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch trophy SVG
        run: |
          HTTP_CODE=$(curl -s -o /tmp/trophies_new.svg -w "%{http_code}" \
            "https://github-profile-trophy.vercel.app/?username=evgeniimatveev&theme=tokyonight&row=1&column=6&no-frame=true&margin-w=8")
          echo "HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ] && grep -q "<svg" /tmp/trophies_new.svg; then
            cp /tmp/trophies_new.svg assets/trophies.svg
            echo "✅ Trophies cache updated"
          else
            echo "⚠️ Service returned $HTTP_CODE — keeping cached version"
            cat /tmp/trophies_new.svg | head -5
          fi

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/trophies.svg
          if git diff --staged --quiet; then
            echo "No changes, skip commit"
          else
            git commit -m "🏆 Cache trophies SVG [skip ci]"
            git push
          fi
